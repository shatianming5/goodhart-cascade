model:
  name: Qwen/Qwen2.5-Coder-7B
  trust_remote_code: true
training:
  total_steps: 1000
  batch_size: 4
  gradient_accumulation_steps: 4
  rollouts_per_prompt: 8
  lr: 5.0e-06
  kl_coeff: 0.01
  warmup_steps: 50
  max_grad_norm: 1.0
  clip_range: 0.2
  gamma: 1.0
  generation_max_length: 1024
checkpointing:
  save_every: 100
  output_dir: results/7B_R2_v2
vllm:
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.85
  max_model_len: 4096
evaluation:
  mbpp_size: 100
  classeval_size: 50
  eval_every: 100
logging:
  log_all_dims: true
data_path: data/sweet_spot_7B.json
experiment_name: 7B_R2_v2
description: Test + Pylint v2
reward:
  test: 0.7
  pylint: 0.3
