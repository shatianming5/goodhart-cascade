experiment_name: 1.5B_R4
description: "1.5B test + pylint + complexity + comment"

model:
  name: Qwen/Qwen2.5-Coder-1.5B
  trust_remote_code: true

reward:
  test: 0.5
  pylint: 0.2
  complexity: 0.15
  comment: 0.15

training:
  total_steps: 1000
  batch_size: 16
  rollouts_per_prompt: 8
  lr: 5.0e-7
  kl_coeff: 0.03
  warmup_steps: 100
  max_grad_norm: 1.0
  clip_range: 0.2
  gamma: 1.0
  generation_max_length: 2048
  temperature: 0.7

checkpointing:
  save_every: 100
  output_dir: results/1.5B_R4

vllm:
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.85
  max_model_len: 4096

logging:
  log_all_dims: true
