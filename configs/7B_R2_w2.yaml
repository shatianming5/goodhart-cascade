experiment_name: 7B_R2_w2
description: "7B weight robustness: test:pylint = 0.8:0.2"

model:
  name: Qwen/Qwen2.5-Coder-7B
  trust_remote_code: true

reward:
  test: 0.8
  pylint: 0.2

training:
  total_steps: 1000
  batch_size: 16
  rollouts_per_prompt: 8
  lr: 5.0e-7
  kl_coeff: 0.03
  warmup_steps: 100
  max_grad_norm: 1.0
  clip_range: 0.2
  gamma: 1.0
  generation_max_length: 2048
  temperature: 0.7

checkpointing:
  save_every: 100
  output_dir: results/7B_R2_w2

vllm:
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.85
  max_model_len: 4096

logging:
  log_all_dims: true
data_path: data/sweet_spot_7B.json
