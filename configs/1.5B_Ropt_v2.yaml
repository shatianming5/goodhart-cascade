experiment_name: 1.5B_Ropt_v2
description: "Theory-predicted optimal: maximize positive-Cov constraints, exclude comment"
model:
  name: Qwen/Qwen2.5-Coder-1.5B
  trust_remote_code: true
reward:
  test: 0.5
  complexity: 0.2
  pylint: 0.2
  duplication: 0.1
training:
  total_steps: 1000
  batch_size: 8
  gradient_accumulation_steps: 2
  rollouts_per_prompt: 8
  lr: 5.0e-6
  kl_coeff: 0.01
  warmup_steps: 50
  max_grad_norm: 1.0
  clip_range: 0.2
  gamma: 1.0
  generation_max_length: 1024
checkpointing:
  save_every: 100
  output_dir: results/1.5B_Ropt_v2
vllm:
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.85
  max_model_len: 4096
logging:
  log_all_dims: true
data_path: data/sweet_spot_1.5B.json
